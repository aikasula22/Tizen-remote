    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');

    }

    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {

      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);

      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);

    // Parse the template and swap the root element. Scripts inserted via

    // createElement so they execute, awaiting onload for src scripts to

      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);

a(0,0,0,.88),0 1px 0 rgba(255,255,255,.025);\n}\n\n/* ══ APP BUTTONS ══ */\n.apps-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;width:100%;padding:0 4px;justify-items:center}\n.apps-row2{display:flex;justify-content:center;width:100%}\n.rb-app{\n  width:54px;height:54px;border-radius:50%;\n  background:linear-gradient(148deg,#282828,#1c1c1c);\n  box-shadow:0 3px 9px rgba(0,0,0,.82),inset 0 1px 0 rgba(255,255,255,.08),inset 0 -1px 5px rgba(0,0,0,.5);\n  cursor:pointer;display:flex;align-items:center;justify-content:center;\n  -webkit-tap-highlight-color:transparent;transition:transform 75ms,filter 75ms;\n  flex-direction:column;gap:1px;text-align:center;\n}\n.rb-app:hover{filter:brightness(1.22)}\n.rb-app.pressed{transform:scale(.89)}\n.rb-app-off{opacity:.22;pointer-events:none;cursor:default}\n.rb-app-off:hover{filter:none}\n.nf-n{font-family:Georgia,'Times New Roman',serif;font-size:26px;font-weight:900;color:#e50914;line-height:1}\n.stv-t{font-size:5.5px;font-weight:600;color:rgba(255,255,255,.6);letter-spacing:.2px;line-height:1.5;text-align:center}\n.pv-w{display:flex;flex-direction:column;align-items:center;gap:1px}\n.pv-a{color:#00a8e0;font-size:7.5px;font-weight:700}\n.pv-v{font-size:5.5px;color:rgba(255,255,255,.5)}\n.yt-icon{width:30px;height:21px;background:#ff0000;border-radius:6px;display:flex;align-items:center;justify-content:center}\n.yt-icon::after{content:'';border-left:9px solid #fff;border-top:5.5px solid transparent;border-bottom:5.5px solid transparent;margin-left:2px}\n\n/* ══ SIDE PANEL ══ */\n.side{display:flex;flex-direction:column;gap:14px;width:320px;min-width:260px}\n.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px}\n.card-ttl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--dim);display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}\n\n/* log */\n.log-body{\n  background:#060609;border:1px solid #141420;border-radius:7px;\n  height:200px;overflow-y:auto;padding:8px 10px;\n  font-family:'SF Mono','Fira Code',Consolas,monospace;font-size:11px;\n  scrollbar-width:thin;scrollbar-color:#1a1a28 transparent;\n}\n.log-body::-webkit-scrollbar{width:4px}\n.log-body::-webkit-scrollbar-thumb{background:#1a1a28;border-radius:2px}\n.le{display:flex;gap:8px;padding:1.5px 0}\n.lt{color:#252532;min-width:52px}\n.lm.blue{color:#00b4d8}.lm.purple{color:#b39ddb}.lm.green{color:#74c69d}.lm.red{color:#ff8fa3}.lm.gray{color:#303040}\n.log-ft{display:flex;align-items:center;justify-content:space-between;margin-top:8px}\n.log-ct{font-size:10.5px;color:var(--dimmer)}\n.btn-sm{padding:3px 9px;background:transparent;border:1px solid #1a1a28;border-radius:5px;color:#383848;font-size:10.5px;cursor:pointer;transition:color .2s,border-color .2s;font-family:inherit}\n.btn-sm:hover{color:var(--err);border-color:var(--err)}\n\n/* keyboard shortcuts */\n.kb-grid{display:grid;grid-template-columns:auto 1fr;gap:5px 14px;font-size:11px}\n.kb-key{background:#0a0a12;border:1px solid #1a1a28;border-radius:4px;padding:2px 7px;font-family:monospace;font-size:10.5px;color:var(--accent);white-space:nowrap;text-align:center}\n.kb-desc{color:var(--dim);line-height:1.6;display:flex;align-items:center}\n\n/* custom key */\n.key-sender{display:flex;gap:8px}\n.key-input{flex:1;min-width:0;background:#060609;border:1px solid #141420;border-radius:7px;padding:8px 10px;color:var(--text);font-size:12px;font-family:'SF Mono',Consolas,monospace;outline:none;text-transform:uppercase}\n.key-input:focus{border-color:var(--accent)}\n.key-input::placeholder{color:#1a1a28;text-transform:none}\n.btn-send{padding:8px 15px;background:var(--accent);border:none;border-radius:7px;color:#000;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .2s,opacity .2s}\n.btn-send:hover{background:#00ccf5}\n.btn-send:active{opacity:.8}\n\n@media(max-width:620px){\n  body{flex-direction:column;align-items:center;padding:20px 14px}\n  .side{width:100%;max-width:420px}\n}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n<!-- ══════════ REMOTE ══════════ -->\n<div class=\"remote-col\">\n  <div class=\"remote disconnected\" id=\"remote\">\n\n    <!-- CONNECTION (inside remote) -->\n    <div class=\"conn\">\n      <div class=\"conn-row\">\n        <input type=\"text\" id=\"tv-ip\" class=\"ci\" placeholder=\"192.168.x.x  TV IP\" autocomplete=\"off\">\n        <div class=\"sdot\" id=\"sdot\"><\u002Fdiv>\n      <\u002Fdiv>\n      <input type=\"password\" id=\"tv-tok\" class=\"ci\" placeholder=\"RC token - leave blank, auto-paired\" autocomplete=\"off\" style=\"width:100%\">\n      <div class=\"conn-hint\" id=\"conn-hint\">First time: leave token blank, then press Allow on your TV.<\u002Fdiv>\n      <button class=\"conn-btn always-on\" id=\"conn-btn\" onclick=\"toggleConnect()\">Connect<\u002Fbutton>\n      <div class=\"conn-msg\" id=\"conn-msg\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"rdiv\"><\u002Fdiv>\n\n    <!-- SOURCE · POWER · gap -->\n    <div class=\"btn-row\">\n      <div class=\"rb rb-sm btn\" id=\"btn-KEY_SOURCE\" title=\"Source\">\n        <svg width=\"16\" height=\"14\" viewBox=\"0 0 16 14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.55\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <rect x=\"1\" y=\"1\" width=\"14\" height=\"10\" rx=\"1.5\"><\u002Frect>\n          <path d=\"M5 11v2M11 11v2M3 13h10\"><\u002Fpath>\n          <path d=\"M6 5.5L10 8 6 10.5z\" fill=\"currentColor\" stroke=\"none\" opacity=\".7\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"rb rb-power btn\" id=\"btn-KEY_POWER\" title=\"Power\">\n        <svg width=\"15\" height=\"15\" viewBox=\"0 0 16 16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.85\" stroke-linecap=\"round\">\n          <path d=\"M8 1.5v5.5\"><\u002Fpath>\n          <path d=\"M4.8 3.8a6 6 0 1 0 6.4 0\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"rb-gap\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 123 BUTTON -->\n    <div class=\"row-123\">\n      <div class=\"rb-123 btn\" id=\"btn-123\" onclick=\"toggle123(event)\" title=\"Number pad / Smart Hub\">\n        <span class=\"lbl-123\">123<\u002Fspan>\n        <div class=\"dots-123\">\n          <div class=\"d123 dr\"><\u002Fdiv><div class=\"d123 dg\"><\u002Fdiv>\n          <div class=\"d123 db\"><\u002Fdiv><div class=\"d123 dy\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- NUMBER PAD -->\n    <div class=\"numpad\" id=\"numpad\" style=\"display:none\">\n      <div class=\"rb-num btn\" data-key=\"KEY_1\">1<\u002Fdiv>\n      <div class=\"rb-num btn\" data-key=\"KEY_2\">2<\u002Fdiv>\n      <div class=\"rb-num btn\" data-key=\"KEY_3\">3<\u002Fdiv>\n      <div class=\"rb-num btn\" data-key=\"KEY_4\">4<\u002Fdiv>\n      <div class=\"rb-num btn\" data-key=\"KEY_5\">5<\u002Fdiv>\n      <div class=\"rb-num btn\" data-key=\"KEY_6\">6<\u002Fdiv>\n      <div class=\"rb-num btn\" data-key=\"KEY_7\">7<\u002Fdiv>\n      <div class=\"rb-num btn\" data-key=\"KEY_8\">8<\u002Fdiv>\n      <div class=\"rb-num btn\" data-key=\"KEY_9\">9<\u002Fdiv>\n      <div class=\"rb-num btn\" data-key=\"KEY_0\" style=\"grid-column:2\">0<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- D-PAD -->\n    <div class=\"dpad-wrap\">\n      <div class=\"dpad-ring\">\n        <div class=\"dsec ds-up    btn\" id=\"btn-KEY_UP\" title=\"Up\"><\u002Fdiv>\n        <div class=\"dsec ds-right btn\" id=\"btn-KEY_RIGHT\" title=\"Right\"><\u002Fdiv>\n        <div class=\"dsec ds-down  btn\" id=\"btn-KEY_DOWN\" title=\"Down\"><\u002Fdiv>\n        <div class=\"dsec ds-left  btn\" id=\"btn-KEY_LEFT\" title=\"Left\"><\u002Fdiv>\n        <span class=\"darr da-u\">▲<\u002Fspan>\n        <span class=\"darr da-d\">▼<\u002Fspan>\n        <span class=\"darr da-l\">◀<\u002Fspan>\n        <span class=\"darr da-r\">▶<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"dpad-ok btn\" id=\"btn-KEY_ENTER\" title=\"OK / Select\">OK<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- BACK · HOME · PLAY/PAUSE -->\n    <div class=\"btn-row\">\n      <div class=\"rb rb-sm btn\" id=\"btn-KEY_RETURN\" title=\"Back\">\n        <svg width=\"14\" height=\"12\" viewBox=\"0 0 14 12\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <path d=\"M5 1L1 6l4 5\"><\u002Fpath><path d=\"M1 6h8a4 4 0 0 0 0-4\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"rb rb-sm btn\" id=\"btn-KEY_HOME\" title=\"Home\">\n        <svg width=\"14\" height=\"13\" viewBox=\"0 0 14 13\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.55\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n          <path d=\"M1 6.8L7 1.5l6 5.3\"><\u002Fpath><path d=\"M3 6v6h3V9h2v3h3V6\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"rb rb-sm btn\" id=\"btn-KEY_PLAY_BACK\" title=\"Play / Pause\">\n        <svg width=\"15\" height=\"12\" viewBox=\"0 0 15 12\" fill=\"currentColor\">\n          <rect x=\"0.5\" y=\"1\" width=\"3.2\" height=\"10\" rx=\"0.8\"><\u002Frect>\n          <rect x=\"4.8\" y=\"1\" width=\"3.2\" height=\"10\" rx=\"0.8\"><\u002Frect>\n          <path d=\"M9.5 1.5 15.5 6 9.5 10.5z\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- TOUCH BAR (decorative) -->\n    <div class=\"touch-bar\"><\u002Fdiv>\n\n    <!-- VOL+ · MUTE · VOL- -->\n    <div class=\"btn-row\">\n      <div class=\"rb rb-sm btn\" id=\"btn-KEY_VOLUP\" title=\"Volume Up\">\n        <svg width=\"17\" height=\"14\" viewBox=\"0 0 17 14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\">\n          <polygon points=\"1,3.5 1,10.5 4,10.5 7.5,13 7.5,1 4,3.5\" fill=\"currentColor\" stroke=\"none\" opacity=\".7\"><\u002Fpolygon>\n          <path d=\"M10 4.5a4 4 0 0 1 0 5M12.5 2.5a7 7 0 0 1 0 9\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"rb rb-sm btn\" id=\"btn-KEY_MUTE\" title=\"Mute\">\n        <svg width=\"17\" height=\"14\" viewBox=\"0 0 17 14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\">\n          <polygon points=\"1,3.5 1,10.5 4,10.5 7.5,13 7.5,1 4,3.5\" fill=\"currentColor\" stroke=\"none\" opacity=\".7\"><\u002Fpolygon>\n          <path d=\"M11 4.5l4.5 5M15.5 4.5l-4.5 5\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"rb rb-sm btn\" id=\"btn-KEY_VOLDOWN\" title=\"Volume Down\">\n        <svg width=\"17\" height=\"14\" viewBox=\"0 0 17 14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\">\n          <polygon points=\"1,3.5 1,10.5 4,10.5 7.5,13 7.5,1 4,3.5\" fill=\"currentColor\" stroke=\"none\" opacity=\".7\"><\u002Fpolygon>\n          <path d=\"M10 6a3 3 0 0 1 0 3\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- APPS ROW 1: Netflix · Samsung TV+ (disabled) · Prime Video -->\n    <div class=\"apps-grid\">\n      <div class=\"rb-app btn\" data-app=\"3201907018807\" title=\"Netflix\">\n        <span class=\"nf-n\">N<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"rb-app rb-app-off\" title=\"Samsung TV Plus — app ID not resolvable on this TV model (Tizen 9.0); launch it from the TV Source menu\">\n        <span class=\"stv-t\">Samsung<br>TV Plus<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"rb-app btn\" data-app=\"3201910019365\" title=\"Prime Video\">\n        <div class=\"pv-w\"><span class=\"pv-a\">prime<\u002Fspan><span class=\"pv-v\">video<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- APP ROW 2: YouTube -->\n    <div class=\"apps-row2\">\n      <div class=\"rb-app btn\" data-app=\"111299001912\" title=\"YouTube\">\n        <div class=\"yt-icon\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv><!-- /remote -->\n<\u002Fdiv><!-- /remote-col -->\n\n\n<!-- ══════════ SIDE PANEL ══════════ -->\n<div class=\"side\">\n\n  <!-- LOG -->\n  <div class=\"card\">\n    <div class=\"card-ttl\">\n      <span>Command Log<\u002Fspan>\n      <div style=\"display:flex;gap:10px;align-items:center\">\n        <span class=\"log-ct\" id=\"log-ct\">0 keys · 0 apps<\u002Fspan>\n        <button class=\"btn-sm\" onclick=\"clearLog()\">Clear<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"log-body\" id=\"log-body\">\n      <div class=\"le\"><span class=\"lt\">--:--:--<\u002Fspan><span class=\"lm gray\">Waiting for connection…<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- KEYBOARD SHORTCUTS -->\n  <div class=\"card\">\n    <div class=\"card-ttl\"><span>Keyboard Shortcuts<\u002Fspan><\u002Fdiv>\n    <div class=\"kb-grid\">\n      <span class=\"kb-key\">↑ ↓ ← →<\u002Fspan><span class=\"kb-desc\">D-pad navigation<\u002Fspan>\n      <span class=\"kb-key\">Enter<\u002Fspan><span class=\"kb-desc\">OK / Select<\u002Fspan>\n      <span class=\"kb-key\">Esc<\u002Fspan><span class=\"kb-desc\">Back (KEY_RETURN)<\u002Fspan>\n      <span class=\"kb-key\">Backspace<\u002Fspan><span class=\"kb-desc\">Delete (KEY_DEL)<\u002Fspan>\n      <span class=\"kb-key\">Space<\u002Fspan><span class=\"kb-desc\">Play / Pause (KEY_PLAY_BACK)<\u002Fspan>\n      <span class=\"kb-key\">+ / −<\u002Fspan><span class=\"kb-desc\">Volume up / down<\u002Fspan>\n      <span class=\"kb-key\">M<\u002Fspan><span class=\"kb-desc\">Mute<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"font-size:10px;color:var(--dimmer);margin-top:10px\">Active only when connected.<\u002Fp>\n  <\u002Fdiv>\n\n  <!-- CUSTOM KEY SENDER -->\n  <div class=\"card\">\n    <div class=\"card-ttl\"><span>Custom Key<\u002Fspan><\u002Fdiv>\n    <div class=\"key-sender\">\n      <input type=\"text\" class=\"key-input\" id=\"custom-key\" placeholder=\"KEY_XXXX (auto-prefixed)\" autocomplete=\"off\" onkeydown=\"if(event.key==='Enter')sendCustomKey()\">\n      <button class=\"btn-send\" onclick=\"sendCustomKey()\">Send<\u002Fbutton>\n    <\u002Fdiv>\n    <p style=\"font-size:10px;color:var(--dimmer);margin-top:9px\">Type a key code and hit Send or Enter.<\u002Fp>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<script>\n/* ══ STATE ══ */\nlet ws = null, tvConn = false, keyCt = 0, appCt = 0, numOpen = false;\nconst $  = id => document.getElementById(id);\nconst ts = ()  => new Date().toTimeString().slice(0, 8);\n\n/* ══ LOG ══ */\nfunction log(msg, c = 'gray') {\n  const b = $('log-body'), e = document.createElement('div');\n  e.className = 'le';\n  e.innerHTML = `<span class=\"lt\">${ts()}<\u002Fspan><span class=\"lm ${c}\">${msg}<\u002Fspan>`;\n  b.appendChild(e);\n  b.scrollTop = b.scrollHeight;\n}\nfunction clearLog() { $('log-body').innerHTML = ''; keyCt = 0; appCt = 0; syncCt(); }\nfunction syncCt()   { $('log-ct').textContent = `${keyCt} keys · ${appCt} apps`; }\n\n/* ══ STATUS ══ */\nfunction setDot(s)     { $('sdot').className = 'sdot' + (s ? ' ' + s : ''); }\nfunction setMsg(m, c)  { const el = $('conn-msg'); el.innerHTML = m; el.className = 'conn-msg' + (c ? ' ' + c : ''); }\n\n/* ══ CONNECT / DISCONNECT ══ */\nfunction toggleConnect() {\n  tvConn || ws ? tvDisconnect() : tvConnect();\n}\n\nfunction tvConnect() {\n  const ip  = $('tv-ip').value.trim();\n  const tok = $('tv-tok').value.trim() || localStorage.getItem('samsung_rc_token_' + ip) || '';\n  const pairing = !tok;\n  if (!ip) { setDot('err'); setMsg('Enter a TV IP address first.', 'err'); return; }\n\n  localStorage.setItem('rem_tv_ip', ip);\n  if (ws) { try { ws.close(); } catch(e) {} ws = null; }\n\n  setDot('ing'); setMsg('Connecting…', 'warn');\n  $('conn-btn').textContent = 'Cancel';\n  if (pairing) setMsg('Check your TV - press Allow on the TV', 'warn pulse');\n\n  // Connect via the Fly.io relay (valid SSL, no mixed-content / self-signed cert\n  // issues). The agent on your machine bridges the relay to the TV's RC socket.\n  let url = `wss://tizen-remote.fly.dev/ws?tvIp=${encodeURIComponent(ip)}&type=browser`;\n\n  let tid;\n\n  try { ws = new WebSocket(url); }\n  catch(e) {\n    clearTimeout(tid); setDot('err'); setMsg(e.message, 'err');\n    log('WS error: ' + e.message, 'red'); resetBtn(); return;\n  }\n\n  ws.onopen = () => {\n    try { ws.send(JSON.stringify({ type: 'hello', tvIp: ip })); } catch(e) {}\n    tid = setTimeout(() => {\n      if (!tvConn) {\n        ws && ws.close(); ws = null;\n        setDot('err'); setMsg('Timed out — is the TV on and reachable?', 'err');\n        resetBtn(); log('Connection timed out', 'red');\n      }\n    }, pairing ? 60000 : 10000);\n    log(pairing ? 'Pairing - waiting for you to press Allow on the TV...' : 'Socket open - authorizing...', 'gray');\n  };\n\n  function markConnected() {\n    clearTimeout(tid); tvConn = true;\n    setDot('ok'); setMsg('Connected ✓', 'ok');\n    $('remote').classList.remove('disconnected');\n    $('conn-btn').textContent = 'Disconnect';\n    $('conn-btn').classList.add('live');\n    log('Connected to ' + ip, 'green');\n  }\n\n  ws.onmessage = ev => {\n    try {\n      const d = JSON.parse(ev.data);\n      if (d.event === 'ms.channel.connect') {\n        if (d.data && d.data.token) {\n          localStorage.setItem('samsung_rc_token_' + ip, d.data.token);\n          log('Paired - token saved for ' + ip, 'green');\n        }\n        markConnected();\n      } else if (d.event === 'ms.channel.unauthorized') {\n        localStorage.removeItem('samsung_rc_token_' + ip);\n        setMsg('Saved token rejected - reconnecting to re-pair...', 'err');\n        log('Unauthorized - cleared saved token, re-pairing', 'red');\n        try { ws.close(); } catch(e) {}\n        setTimeout(() => tvConnect(), 600);\n      }\n    } catch(e) {}\n  };\n\n  ws.onerror = () => {\n    clearTimeout(tid);\n    if (!tvConn) {\n      setDot('err');\n      setMsg(\n        `Can't reach the TV through the relay.<br>Start the agent on your machine:<br><code style=\"color:var(--accent)\">node agent.js ${ip}</code>`, 'err'\n      );\n      log('Relay/agent not reachable - the agent bridges the relay to your TV.', 'red');\n      log('Start the agent on your machine:  node agent.js ' + ip, 'gray');\n      ws = null; resetBtn();\n    }\n  };\n\n  ws.onclose = () => {\n    clearTimeout(tid);\n    if (tvConn) {\n      tvConn = false;\n      $('remote').classList.add('disconnected');\n      setDot(''); setMsg('Disconnected', '');\n      resetBtn(); log('TV disconnected', 'gray');\n    }\n    ws = null;\n  };\n}\n\nfunction tvDisconnect() {\n  tvConn = false;\n  $('remote').classList.add('disconnected');\n  if (ws) { try { ws.close(); } catch(e) {} ws = null; }\n  setDot(''); setMsg('Disconnected', '');\n  resetBtn(); log('Disconnected (manual)', 'gray');\n}\n\nfunction resetBtn() {\n  $('conn-btn').textContent = 'Connect';\n  $('conn-btn').classList.remove('live');\n}\n\n/* ══ SEND KEY — TEXT FRAME (critical for Tizen) ══ */\nfunction sendKey(k) {\n  if (!tvConn || !ws || ws.readyState !== WebSocket.OPEN) {\n    log(`[${k}] — not connected`, 'gray'); return;\n  }\n  ws.send(JSON.stringify({\n    method: 'ms.remote.control',\n    params: { Cmd: 'Click', DataOfCmd: k, Option: 'false', TypeOfRemote: 'SendRemoteKey' }\n  })); // ws.send(string) = TEXT frame\n  keyCt++;\n  log('→ ' + k, 'blue');\n  syncCt();\n}\n\n/* ══ CUSTOM KEY ══ */\nfunction sendCustomKey() {\n  let k = $('custom-key').value.trim().toUpperCase();\n  if (!k) return;\n  if (!k.startsWith('KEY_')) k = 'KEY_' + k;\n  sendKey(k);\n  $('custom-key').value = '';\n}\n\n/* ══ APP LAUNCH (REST, not WebSocket) ══ */\nasync function launchApp(appId) {\n  const ip = $('tv-ip').value.trim() || localStorage.getItem('rem_tv_ip') || '';\n  log('↗ Launching app ' + appId + '…', 'purple');\n\n  // Primary: local bridge (avoids SSL issues)\n  try {\n    const r = await fetch(`http://localhost:3001/app/${appId}`, { method: 'POST' });\n    if (r.ok) { appCt++; log('✓ Launched via bridge (' + appId + ')', 'green'); syncCt(); return; }\n  } catch(e) {}\n\n  // Fallback: direct TV REST API (HTTP, not HTTPS)\n  if (ip) {\n    try {\n      const r = await fetch(`http://${ip}:8001/api/v2/applications/${appId}`, { method: 'POST' });\n      if (r.ok) { appCt++; log('✓ Launched direct (' + appId + ')', 'green'); syncCt(); return; }\n      log('✗ App launch HTTP ' + r.status + ' (' + appId + ')', 'red'); return;\n    } catch(e) {\n      log('✗ App launch error: ' + e.message, 'red'); return;\n    }\n  }\n  log('✗ No bridge and no TV IP — cannot launch (' + appId + ')', 'red');\n}\n\n/* ══ 123 NUMBER PAD TOGGLE ══ */\nfunction toggle123(e) {\n  e && e.stopPropagation();\n  numOpen = !numOpen;\n  $('numpad').style.display = numOpen ? 'grid' : 'none';\n  $('btn-123').classList.toggle('active', numOpen);\n}\n\n/* ══ WIRE ALL BUTTONS ══ */\nfunction wire(el, action) {\n  const isOK   = el.classList.contains('dpad-ok');\n  const isApp  = el.dataset.app;\n  const isNum  = el.dataset.key;\n  const press  = () => {\n    el.classList.add('pressed');\n    if (isApp)  launchApp(el.dataset.app);\n    else if (isNum) sendKey(el.dataset.key);\n    else if (action) sendKey(action);\n  };\n  const up = () => el.classList.remove('pressed');\n  el.addEventListener('mousedown',  press);\n  el.addEventListener('mouseup',    up);\n  el.addEventListener('mouseleave', up);\n  el.addEventListener('touchstart', ev => { ev.preventDefault(); press(); }, { passive: false });\n  el.addEventListener('touchend',   up);\n}\n\n// Buttons with id=\"btn-KEY_*\"\ndocument.querySelectorAll('[id^=\"btn-KEY_\"]').forEach(el => {\n  wire(el, el.id.replace('btn-', ''));\n});\n\n// Number pad buttons (data-key)\ndocument.querySelectorAll('[data-key]').forEach(el => wire(el, null));\n\n// App buttons (data-app)\ndocument.querySelectorAll('[data-app]').forEach(el => wire(el, null));\n\n/* ══ KEYBOARD SHORTCUTS (active only when connected) ══ */\ndocument.addEventListener('keydown', e => {\n  if (['INPUT', 'TEXTAREA'].includes(e.target.tagName)) return;\n  if (!tvConn) return;\n  const map = {\n    ArrowUp: 'KEY_UP', ArrowDown: 'KEY_DOWN',\n    ArrowLeft: 'KEY_LEFT', ArrowRight: 'KEY_RIGHT',\n    Enter: 'KEY_ENTER',\n    Escape: 'KEY_RETURN',\n    Backspace: 'KEY_DEL',\n    ' ': 'KEY_PLAY_BACK',\n    '+': 'KEY_VOLUP', '=': 'KEY_VOLUP',\n    '-': 'KEY_VOLDOWN', '_': 'KEY_VOLDOWN',\n    m: 'KEY_MUTE', M: 'KEY_MUTE'\n  };\n  const k = map[e.key];\n  if (!k) return;\n  e.preventDefault();\n  sendKey(k);\n  const btn = $('btn-' + k);\n  if (btn) { btn.classList.add('pressed'); setTimeout(() => btn.classList.remove('pressed'), 130); }\n});\n\n/* ══ INIT ══ */\nwindow.addEventListener('DOMContentLoaded', () => {\n  const ip = localStorage.getItem('rem_tv_ip');\n  if (ip) $('tv-ip').value = ip;\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
